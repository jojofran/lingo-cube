name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'lingo_cube_web/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lingo_cube_web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: lingo_cube_web

      - name: Build
        run: npm run build
        working-directory: lingo_cube_web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: lingo_cube_web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
